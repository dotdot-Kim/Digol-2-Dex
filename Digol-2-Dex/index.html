<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 디지몬 도감 테스트</title>
  <style>
    /* 화면 디자인 (CSS) */
    body {
      background-color: #f4f4f9;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      justify-content: center;
      padding: 50px;
    }
    .card {
      background: white;
      width: 250px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }
	.card h2 {
      margin-top: 8px;    /* 이미지와 이름 사이의 간격 */
      margin-bottom: 8px; /* 이름과 타입 뱃지 사이의 간격 */
      font-size: 22px;    /* 덤으로 글자 크기도 취향껏 조절 가능합니다 */
    }
    .monster-image {
      /* 크기를 80px로 고정하지 않고 유연하게 바꿉니다 */
      width: 100%; 
      max-width: 150px; /* 카드를 넘어가지 않게 최대 크기 설정 */
      height: auto; 
      object-fit: contain; /* 비율이 찌그러지지 않게 유지 */
      
      /* image-rendering: pixelated; 는 지웠습니다! */
      border: 2px solid #ddd;
      border-radius: 8px;
      background-color: #fff;
    }
    .badge {
      display: inline-block;
      background-color: #a8a878; /* 노말 타입 색상 */
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .stats {
      text-align: left;
      font-size: 14px;
      line-height: 1.6;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div id="dex-container"></div>

<script>
  // 한글 번역 사전
  const typeDic = {
    "TYPE_NORMAL": "노말",
    "TYPE_FIRE": "불꽃",
    "TYPE_WATER": "물",
    "TYPE_GRASS": "풀",
    "TYPE_ELECTRIC": "전기"
  };

  // 1. 외부 JSON 파일을 읽어옵니다
  fetch('data.json')
    .then(response => response.json()) // 읽어온 데이터를 JSON으로 변환
    .then(db => {
      // 2. 데이터에서 특정 몬스터 정보를 가져옵니다
      const target = db["SPECIES_KAMMON"];
      const stats = target.personal_data.base_stats;
      const rawType = target.personal_data.types[0];
      const typeName = typeDic[rawType] || rawType.replace("TYPE_", "");

      // 3. 화면에 카드를 그립니다
      document.getElementById("dex-container").innerHTML = `
        <div class="card">
          <img src="${target.image}" class="monster-image" alt="몬스터 이미지">
          <h2>${target.name_ko}</h2>
          <div class="badge">${typeName}</div>
          
          <div class="stats">
            <strong>📊 종족치 (Base Stats)</strong><br>
            HP : ${stats[0]}<br>
            공격 : ${stats[1]}<br>
            방어 : ${stats[2]}<br>
            특수공격 : ${stats[4]}<br>
            특수방어 : ${stats[5]}<br>
			스피드 : ${stats[3]}
          </div>
        </div>
      `;
    })
    .catch(error => {
      console.error('데이터를 불러오는 중 오류 발생:', error);
      document.getElementById("dex-container").innerHTML = "데이터를 불러올 수 없습니다. 콘솔창(F12)을 확인하세요.";
    });
</script>
</body>
</html>
